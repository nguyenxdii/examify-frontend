<svg viewBox="0 0 280 92" xmlns="http://www.w3.org/2000/svg" width="280" height="92">
  <defs>
    <linearGradient id="boxFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a374ff"/>
      <stop offset="100%" style="stop-color:#6b2ef0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#8b57f2" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded square icon -->
  <rect x="8" y="8" width="74" height="74" rx="18" ry="18" fill="url(#boxFill)" filter="url(#shadow)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Inner subtle highlight -->
  <rect x="8" y="8" width="74" height="36" rx="18" ry="18" fill="white" opacity="0.07" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.07;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Letter S -->
  <text x="45" y="64" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:50px;font-weight:700;text-anchor:middle;dominant-baseline:auto">S</text>

  <!-- Brand name -->
  <text x="100" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" fill="#8b57f2" dominant-baseline="middle" style="fill:rgb(139, 87, 242);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:32px;font-weight:700;text-anchor:start;dominant-baseline:middle">Syn</text>
  <text x="163" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="400" fill="#8b57f2" dominant-baseline="middle" style="fill:rgb(139, 87, 242);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:32px;font-weight:400;text-anchor:start;dominant-baseline:middle">De</text>
</svg>